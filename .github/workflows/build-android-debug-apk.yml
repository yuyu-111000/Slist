name: Build Android Debug APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
        with:
          accept-android-sdk-licenses: true

      - name: Install dependencies
        run: npm ci

      - name: Build web assets for Android
        run: npm run buildFrontend:stageWeb:unminified

      - name: Sync Capacitor Android project
        run: npm run sync:android

      - name: Build fdroid debug APK (unsigned debug key)
        run: |
          cd android
          ./gradlew :app:assembleFdroidDebug --no-daemon --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: slist-android-debug-apk
          path: |
            android/app/build/outputs/apk/fdroid/debug/*.apk
            android/app/build/outputs/apk/debug/*.apk
